# in this file you can configure the settings for the data download

# the following control areas will be used to download per unit data
# change or improve if needed
states:
  Brandenburg: BB
  Baden-Württemberg: BW
  Bayern: BY
  Hessen: HE
  Mecklenburg-Vorpommern: MV
  Niedersachsen: NI
  Nordrhein-Westfalen: NW
  Rheinland-Pfalz: RP
  Schleswig-Holstein: SH
  Saarland: SL
  Sachsen: SN
  Sachsen-Anhalt: ST
  Thüringen: TH

control_areas:
    TransnetBW: "10YDE-ENBW-----N"
    TenneT: "10YDE-EON------1"
    Amprion: "10YDE-RWENET---I"
    50Hertz: "10YDE-VE-------2"

nuts2_to_state:
    "DE_DE1": "DE_BW"  # Baden-Württemberg
    "DE_DE2": "DE_BY"  # Bayern
    "DE_DE4": "DE_BB"  # Brandenburg
    "DE_DE7": "DE_HE"  # Hessen
    "DE_DE8": "DE_MV"  # Mecklenburg-Vorpommern
    "DE_DE9": "DE_NI"  # Niedersachsen
    "DE_DEA": "DE_NW"  # Nordrhein-Westfalen
    "DE_DEB": "DE_RP"  # Rheinland-Pfalz
    "DE_DEC": "DE_SL"  # Saarland
    "DE_DED": "DE_SN"  # Sachsen
    "DE_DEE": "DE_ST"  # Sachsen-Anhalt
    "DE_DEF": "DE_SH"  # Schleswig-Holstein
    "DE_DEG": "DE_TH"  # Thüringen

flow_tracing_method: aggregated

flow_tracing_methods:
  aggregated:
    method: "Average participation"
    aggregated: true
    dims: ["source", "sink"]
  direct:
    method: "Average participation"
    aggregated: false
    dims: ["source", "sink"]

