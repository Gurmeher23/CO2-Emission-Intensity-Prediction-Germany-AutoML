internal_sigma_weights:
  priority:
    DE: 0
  specific:
    DE:
      generation: 100000
      demand: 100000
      flow: 1000
  default:
    generation: 100
    demand: 100
    flow: 1
    
internal_sigma_thresholds:
  priority:
    DE: 0
  specific:
    DE:
      generation: 0.000001
      demand: 0.000001
      flow: 0.000001
  default:
    generation: 0.1
    demand: 0.1
    flow: 0.1

MaStr:
  crs: epsg:4326  # coordinate system
  default:
    decommissioning date: 2045-01-01
  postcodes:
    path: inputs/shapefiles/plz  # path for postcode list
    name: OSM_PLZ.shp  # name of postcode list
  capacity threshold: 0.001  # filter for minimum capacity of unit in MW
  technologies:
    carrier mapping:
      path: inputs/generation_data  # path of carrier mapping list
      name: MaStr_gen_types.csv  # name of carrier mapping list
    solar:
      azimuth mapping:  # specific mapping of azimuth angles for solar generation
        Ost: 90.0
        Süd: 180
        West: 270.0
        Nord: 360.0
        Süd-Ost: 135.0
        Süd-West: 225.0
        Nord-Ost: 45.0
        Nord-West: 315.0
  dask:  # settings for parallelization
    workers: 12  # number of workers
    threads: 4  # number of threads per worker
    steps: 10000  # steps used in region mapping for parallelization

Shapefiles:
  states:
    path: inputs/shapefiles/states.geojson  # path for shapefiles
    identifier: NUTS_ID  # identifier for shapefile names
